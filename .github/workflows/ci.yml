name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd client && npm install
      - run: cd client && npm run build

  smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run smoke tests
        run: node tests/smoke/api-smoke.js
        env:
          API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}
          SMOKE_USER: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_PASS: ${{ secrets.SMOKE_TEST_PASSWORD }}

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd tests/e2e && npm install
      - run: cd tests/e2e && npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: cd tests/e2e && npx playwright test
        env:
          BASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_APP_URL || secrets.STAGING_APP_URL }}
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
